<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drug Evidence Research API Debugger</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Drug Evidence Research</h1>
        <p>任务运行面板</p>
      </div>
      <div class="header-actions">
        <a class="button-link secondary" href="/skill-editor" target="_blank" rel="noreferrer">SKILL 编辑器</a>
        <button id="refreshTasks" type="button">刷新任务</button>
      </div>
    </header>

    <main class="layout dashboard-layout">
      <section class="panel create-panel">
        <h2>创建任务</h2>
        <form id="createTaskForm" class="stack">
          <label>
            药物 / 候选物
            <input id="drugInput" name="drug" type="text" placeholder="ABC-123" required>
          </label>
          <label>
            额外 Prompt
            <textarea id="promptInput" name="prompt" rows="4" placeholder="可选：补充检索要求"></textarea>
          </label>
          <label>
            Metadata JSON
            <textarea id="metadataInput" name="metadata" rows="4" placeholder='{"sponsor":"example"}'></textarea>
          </label>
          <button type="submit">创建任务</button>
        </form>
      </section>

      <section class="panel tasks-panel">
        <div class="section-title">
          <h2>任务列表</h2>
          <div id="taskListMeta" class="status muted">未加载</div>
        </div>
        <div id="taskList" class="task-list virtual-list" tabindex="0" aria-label="任务列表"></div>
      </section>

      <section class="panel detail-panel">
        <div class="section-title">
          <h2>任务详情</h2>
          <div class="inline-actions">
            <input id="taskIdInput" type="text" placeholder="task id">
            <button id="loadTask" type="button">加载详情</button>
          </div>
        </div>
        <div id="taskDetail" class="task-detail muted">未选择任务</div>
      </section>

      <section class="panel events-panel">
        <div class="section-title">
          <h2>SSE 事件</h2>
          <div class="inline-actions">
            <input id="lastEventIdInput" type="number" min="0" placeholder="Last-Event-ID">
          </div>
        </div>
        <div id="eventStatus" class="status muted">未连接</div>
        <div id="eventSummary" class="event-summary"></div>
        <div id="eventLog" class="event-log"></div>
        <dialog id="rawEventDialog" class="raw-event-dialog">
          <div class="raw-event-head">
            <strong>事件原始数据</strong>
            <button id="closeRawEvent" class="secondary compact" type="button">关闭</button>
          </div>
          <pre id="rawEventOutput" class="raw-json"></pre>
        </dialog>
      </section>

      <section class="panel files-panel">
        <div class="section-title">
          <h2>产物文件</h2>
          <div class="inline-actions">
            <button id="downloadZip" class="secondary" type="button">下载 ZIP</button>
            <button id="loadFiles" type="button">刷新列表</button>
          </div>
        </div>
        <div id="fileList" class="file-list"></div>
      </section>

      <section class="panel response-panel">
        <h2>请求结果</h2>
        <pre id="responseOutput" class="output">等待操作</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
